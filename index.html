<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demex SAV Pro - Gestion Interventions</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #0052CC;
            --primary-dark: #003D99;
            --accent: #FF6B35;
            --success: #00C853;
            --warning: #FFB300;
            --bg: #FAFBFC;
            --surface: #FFFFFF;
            --border: #E0E4E8;
            --text: #0A1929;
            --text-secondary: #5E6C84;
            --shadow: 0 2px 8px rgba(0,0,0,0.08);
            --radius: 12px;
            --font-display: 'Outfit', system-ui, sans-serif;
        }

        body {
            font-family: var(--font-display);
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }

        .container { max-width: 1400px; margin: 0 auto; padding: 0 24px; }
        .card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); box-shadow: var(--shadow); padding: 24px; }
        .btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px; border-radius: 8px; font-weight: 600; font-size: 14px; cursor: pointer; border: none; font-family: var(--font-display); }
        .btn-primary { background: var(--primary); color: white; }
        .badge { display: inline-flex; padding: 4px 12px; border-radius: 100px; font-size: 12px; font-weight: 600; }
        .badge-success { background: #E8F5E9; color: #2E7D32; }
        .badge-warning { background: #FFF8E1; color: #F57C00; }
        .badge-info { background: #E6F0FF; color: #0052CC; }
        .grid { display: grid; gap: 20px; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); }
        .loading { display: flex; align-items: center; justify-content: center; padding: 40px; color: var(--text-secondary); }
        .spinner { width: 24px; height: 24px; border: 3px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error-box { background: #FFEBEE; border: 1px solid #EF5350; color: #C62828; padding: 16px; border-radius: 8px; margin: 20px 0; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, createContext, useContext } = React;

        // API CLIENT
        class DemexAPI {
            constructor() {
                this.baseURL = window.location.hostname === 'localhost' ? 'http://localhost:3000' : '';
            }

            async call(action, data = {}) {
                try {
                    const response = await fetch(`${this.baseURL}/api/odoo?action=${action}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(data)
                    });

                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}`);
                    }

                    const result = await response.json();
                    
                    if (!result.success) {
                        throw new Error(result.message || 'Erreur API');
                    }

                    return result.data || result;
                } catch (error) {
                    console.error(`Erreur API (${action}):`, error);
                    throw error;
                }
            }

            healthCheck() { return this.call('health'); }
            getTickets(filters = [], limit = 50) { return this.call('getTickets', { filters, limit }); }
            getStats() { return this.call('getStats'); }
        }

        // CONTEXT
        const AppContext = createContext();

        const AppProvider = ({ children }) => {
            const [api] = useState(() => new DemexAPI());
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [user] = useState({ name: 'Utilisateur Demex', role: 'admin' });

            useEffect(() => {
                api.healthCheck()
                    .then(() => {
                        console.log('✅ API connectée');
                        setLoading(false);
                    })
                    .catch(err => {
                        console.error('❌ Erreur API:', err);
                        setError(err.message);
                        setLoading(false);
                    });
            }, []);

            return (
                <AppContext.Provider value={{ api, loading, error, user }}>
                    {children}
                </AppContext.Provider>
            );
        };

        // HEADER
        const Header = () => {
            const { user } = useContext(AppContext);

            return (
                <header style={{
                    background: 'linear-gradient(135deg, #0052CC 0%, #003D99 100%)',
                    color: 'white', padding: '20px 0', boxShadow: '0 2px 8px rgba(0,0,0,0.1)'
                }}>
                    <div className="container" style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
                        <div style={{ display: 'flex', alignItems: 'center', gap: '16px' }}>
                            <div style={{
                                width: '48px', height: '48px', background: 'white', borderRadius: '12px',
                                display: 'flex', alignItems: 'center', justifyContent: 'center',
                                fontWeight: 800, fontSize: '20px', color: '#0052CC'
                            }}>DX</div>
                            <div>
                                <h1 style={{ fontSize: '24px', fontWeight: 800 }}>Demex SAV Pro</h1>
                                <p style={{ fontSize: '13px', opacity: 0.9 }}>Gestion des interventions</p>
                            </div>
                        </div>
                        <div style={{ textAlign: 'right' }}>
                            <div style={{ fontWeight: 600, fontSize: '14px' }}>{user.name}</div>
                            <div style={{ fontSize: '12px', opacity: 0.8 }}>{user.role}</div>
                        </div>
                    </div>
                </header>
            );
        };

        // STAT CARD
        const StatCard = ({ icon, title, value, color }) => {
            const IconComponent = lucide[icon];
            
            return (
                <div className="card">
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
                        <div>
                            <div style={{ fontSize: '12px', fontWeight: 600, color: 'var(--text-secondary)', textTransform: 'uppercase', marginBottom: '8px' }}>
                                {title}
                            </div>
                            <div style={{ fontSize: '32px', fontWeight: 800 }}>{value}</div>
                        </div>
                        <div style={{
                            width: '48px', height: '48px', background: `${color}20`,
                            borderRadius: '8px', display: 'flex', alignItems: 'center', justifyContent: 'center', color: color
                        }}>
                            {IconComponent && <IconComponent size={24} />}
                        </div>
                    </div>
                </div>
            );
        };

        // DASHBOARD
        const Dashboard = () => {
            const { api, error } = useContext(AppContext);
            const [stats, setStats] = useState({ total: 0, nouveau: 0, en_cours: 0, resolu: 0 });
            const [tickets, setTickets] = useState([]);
            const [loading, setLoading] = useState(true);
            const [loadError, setLoadError] = useState(null);

            useEffect(() => {
                loadData();
            }, []);

            const loadData = async () => {
                try {
                    const [statsData, ticketsData] = await Promise.all([
                        api.getStats().catch(() => ({ total: 0, nouveau: 0, en_cours: 0, resolu: 0 })),
                        api.getTickets([], 5).catch(() => [])
                    ]);
                    setStats(statsData);
                    setTickets(ticketsData);
                } catch (err) {
                    setLoadError(err.message);
                } finally {
                    setLoading(false);
                }
            };

            if (error) {
                return (
                    <div className="container" style={{ padding: '40px 24px' }}>
                        <div className="error-box">
                            <strong>❌ Erreur de connexion</strong><br/>
                            {error}<br/><br/>
                            Vérifiez que les variables d'environnement ODOO sont bien configurées dans Vercel.
                        </div>
                    </div>
                );
            }

            if (loading) {
                return (
                    <div className="loading" style={{ minHeight: '50vh' }}>
                        <div className="spinner"></div>
                        <span style={{ marginLeft: '12px' }}>Chargement...</span>
                    </div>
                );
            }

            return (
                <div>
                    <div style={{ marginBottom: '32px' }}>
                        <h2 style={{ fontSize: '28px', fontWeight: 800, marginBottom: '8px' }}>Tableau de bord</h2>
                        <p style={{ color: 'var(--text-secondary)' }}>Vue d'ensemble de vos interventions SAV</p>
                    </div>

                    {loadError && (
                        <div className="error-box" style={{ marginBottom: '20px' }}>
                            Impossible de charger les données Odoo : {loadError}
                        </div>
                    )}

                    <div className="grid" style={{ marginBottom: '32px' }}>
                        <StatCard icon="Wrench" title="Total Interventions" value={stats.total} color="#0052CC" />
                        <StatCard icon="AlertCircle" title="Nouvelles" value={stats.nouveau} color="#FF6B35" />
                        <StatCard icon="Clock" title="En cours" value={stats.en_cours} color="#FFB300" />
                        <StatCard icon="CheckCircle" title="Résolues" value={stats.resolu} color="#00C853" />
                    </div>

                    <div className="card">
                        <h3 style={{ fontSize: '18px', fontWeight: 700, marginBottom: '20px' }}>
                            Interventions récentes
                        </h3>
                        {tickets.length === 0 ? (
                            <p style={{ color: 'var(--text-secondary)', textAlign: 'center', padding: '20px' }}>
                                Aucune intervention pour le moment
                            </p>
                        ) : (
                            <div style={{ display: 'flex', flexDirection: 'column', gap: '12px' }}>
                                {tickets.map(ticket => (
                                    <div key={ticket.id} style={{
                                        padding: '16px', border: '1px solid var(--border)', borderRadius: '8px',
                                        display: 'flex', justifyContent: 'space-between', alignItems: 'center'
                                    }}>
                                        <div>
                                            <div style={{ fontWeight: 600, marginBottom: '4px' }}>{ticket.name}</div>
                                            <div style={{ fontSize: '13px', color: 'var(--text-secondary)' }}>
                                                {ticket.partner_id?.[1] || 'Client'} • {new Date(ticket.create_date).toLocaleDateString('fr-FR')}
                                            </div>
                                        </div>
                                        <span className={`badge badge-${
                                            ticket.stage_id?.[1]?.toLowerCase().includes('nouveau') ? 'info' :
                                            ticket.stage_id?.[1]?.toLowerCase().includes('cours') ? 'warning' : 'success'
                                        }`}>
                                            {ticket.stage_id?.[1] || 'N/A'}
                                        </span>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // APP
        const App = () => {
            const { loading } = useContext(AppContext);

            if (loading) {
                return (
                    <div className="loading" style={{ minHeight: '100vh' }}>
                        <div className="spinner"></div>
                        <span style={{ marginLeft: '12px' }}>Connexion...</span>
                    </div>
                );
            }

            return (
                <div>
                    <Header />
                    <main className="container" style={{ padding: '40px 24px' }}>
                        <Dashboard />
                    </main>
                    <footer style={{
                        background: '#0A1929', color: '#8993A4', padding: '24px 0',
                        textAlign: 'center', marginTop: '60px'
                    }}>
                        <div className="container">
                            <p style={{ fontSize: '14px' }}>
                                <span style={{ color: 'white', fontWeight: 600 }}>Demex FR</span> — 
                                <a href="https://www.demexfr.com" target="_blank" style={{ color: '#4A9EFF', marginLeft: '8px' }}>www.demexfr.com</a> — 
                                <a href="tel:0475822686" style={{ color: '#4A9EFF', marginLeft: '8px' }}>04 75 82 26 86</a>
                            </p>
                        </div>
                    </footer>
                </div>
            );
        };

        // INIT
        if (typeof lucide !== 'undefined') {
            lucide.createIcons();
        }
        
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AppProvider><App /></AppProvider>);
    </script>
</body>
</html>
